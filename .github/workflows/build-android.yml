name: Build & Deploy Hush Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play track (internal/alpha/beta/production)"
        default: "internal"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: "21"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            cat > app/keystore.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
            echo "✓ keystore yerleştirildi"
          else
            echo "⚠ ANDROID_KEYSTORE_BASE64 yok — debug imzasıyla derlenir"
          fi

      - name: Decode google-services.json
        env:
          GS_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GS_JSON_BASE64" ]; then
            echo "$GS_JSON_BASE64" | base64 --decode > app/google-services.json
            echo "✓ google-services.json yerleştirildi (Firebase aktif)"
          else
            echo "⚠ google-services.json yok — FCM olmadan derlenecek"
          fi

      - name: Build AAB (release)
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Build APK (debug, hızlı sanity)
        if: ${{ github.event_name == 'push' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hush-${{ github.run_number }}.aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Google Play
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nickdegs.hush
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
